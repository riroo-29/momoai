<!doctype html>
<html lang="ja" class="ios-site">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>もも Voice (iOS)</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260403a" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=20260403a" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=20260403a" />
    <link rel="stylesheet" href="/styles.css?v=20260405c" />
    <script>
      (function () {
        var vv = window.visualViewport;
        var h = Math.ceil((vv && vv.height) || window.innerHeight || document.documentElement.clientHeight || 0);
        if (h > 0) document.documentElement.style.setProperty("--app-height", h + 1 + "px");
      })();
    </script>
  </head>
  <body class="ios-site">
    <main class="phone-stage" aria-label="焔丸AI 音声会話ディスプレイ">
      <section class="display-shell">
        <div id="characterRig" class="character-rig video-active">
          <video
            id="characterVideo"
            class="character-video"
            src="/voice_idle.mp4?v=20260401q"
            data-idle-src="/voice_idle.mp4?v=20260401q"
            data-speak-src="/voice_speaking.mp4?v=20260401q"
            muted
            loop
            autoplay
            playsinline
            webkit-playsinline
            preload="auto"
          ></video>
          <video
            id="characterVideoBuffer"
            class="character-video is-hidden"
            muted
            loop
            autoplay
            playsinline
            webkit-playsinline
            preload="auto"
          ></video>
        </div>

        <div class="hud top">
          <h1>もも</h1>
        </div>

        <div class="hud bottom">
          <div id="voiceStatus" class="voice-status">準備完了。会話モード開始を押してマイク許可してください。</div>
          <div class="voice-controls">
            <button id="liveStartButton" type="button">会話モード開始</button>
            <button id="liveStopButton" type="button" disabled>会話モード停止</button>
          </div>
        </div>

        <button id="fullscreenButton" class="fullscreen-btn" type="button" aria-label="全画面切替" title="全画面切替">
          □
        </button>
      </section>
    </main>

    <script src="/app.js?v=20260414a"></script>
  </body>
</html>
